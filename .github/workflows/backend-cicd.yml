name: Backend CI/CD to AWS ECR

on:
  push:
    branches:
      - develop

permissions:
  id-token: write # OIDC 인증을 위해 필수
  contents: write # team1-config 저장소 푸시를 위해 필수

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Java 17 환경 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. mvnw 실행 권한 부여
      - name: Grant execute permission
        run: chmod +x mvnw

      # 4. AWS OIDC 인증 (AssumeRoleWithWebIdentity 실행 단계)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495599735720:role/team1-github-actions-terraform-role
          aws-region: ap-northeast-2

      # 5. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: team1-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      # 7. Docker 이미지 Push (ECR 권한 검증 단계)
      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: team1-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 8. Kustomize 태그 자동 업데이트 및 Config 저장소 PR 자동 머지
      - name: Update Kustomize Image Tag & Auto-merge PR to Config Repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "team1-ci-bot"
          git config --global user.email "ci-bot@users.noreply.github.com"

          git clone https://${{ secrets.GH_PAT }}@github.com/CLD-05/team1-config.git config-repo
          cd config-repo

          ( cd apps/team1-app/overlays/dev && \
            kustomize edit set image \
              495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-app=495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-app:${{ github.sha }} )

          if git diff --quiet; then
            echo "이미지 태그 변경 없음 — 건너뜀"; exit 0
          fi

          BRANCH="ci/bump-dev-${{ github.sha }}"
          git checkout -b "$BRANCH"
          git commit -am "deploy(dev): team1-app 이미지 ${{ github.sha }} 반영"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "deploy(dev): team1-app ${{ github.sha }}" \
            --body "CI 자동 생성 — develop 빌드 이미지 태그 반영. merge 시 ArgoCD가 dev 배포.")
          gh pr merge "$PR_URL" --squash --auto --delete-branch
