name: Backend PR Test CI

on:
  pull_request:
    branches:
      - develop
    # 백엔드 소스코드나 메이븐 설정이 바뀔 때만 낭비 없이 돌도록 경로 지정
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"

jobs:
  test:
    name: Run Backend Verification
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 코드를 가상 서버로 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 및 메이ذن 환경 세팅 (캐시를 적용해 라이브러리 다운로드 속도 향상)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      # 3. 리눅스 환경(Ubuntu)에서 mvnw를 실행할 수 있도록 권한 부여
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # 4. mvnw Wrapper를 사용하여 유닛 테스트 및 Testcontainers 통합 테스트 실행
      - name: Run tests (unit + Testcontainers integration)
        # 'verify' phase = compile + unit test + integration test.
        # Testcontainers는 ubuntu-latest의 Docker daemon을 자동으로 감지하여 사용합니다.
        # -B: batch mode (CI 환경의 로그 출력을 군더더기 없이 깔끔하게 정리)
        run: ./mvnw -B verify
