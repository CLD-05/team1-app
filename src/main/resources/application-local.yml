spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_registration?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: app
    password: app
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  flyway:
    locations: classpath:db/migration,classpath:db/seed    # ← 시드까지 포함 (local 전용)
  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    com.ops.app: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG