<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 수강 내역</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/enrollments.css">
</head>
<body>
<header>
    <div class="header-left">
        <div class="logo-dot">🎓</div>
        <span class="logo-text">수강신청</span>
    </div>
    <div class="header-right">
        <a href="/courses.html" class="nav-link">강의 검색</a>
        <a href="/enrollments.html" class="nav-link active">내 수강 내역</a>
        <div class="student-badge">
            <div class="avatar" id="avatar">?</div>
            <span id="studentName">로그인 중...</span>
        </div>
		<button type="button" class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
</header>

<main>
    <div class="page-header">
        <h1>내 수강 내역</h1>
        <p>신청한 강의 목록을 확인하고 관리하세요</p>
    </div>

    <div id="alertArea"></div>

    <div class="summary-grid">
        <div class="summary-card accent">
            <div class="summary-label">총 신청 학점</div>
            <div class="summary-value">
                <span id="totalCredits">0</span><span class="summary-unit">학점</span>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-label">신청 과목 수</div>
            <div class="summary-value">
                <span id="enrollmentCount">0</span><span class="summary-unit">개</span>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-label">최대 신청 학점</div>
            <div class="summary-value"><span>21</span><span class="summary-unit">학점</span></div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>강의코드</th>
                <th>강의명</th>
                <th>학점</th>
                <th>신청일시</th>
                <th>취소</th>
            </tr>
            </thead>
            <tbody id="enrollmentList">
                </tbody>
        </table>
    </div>
</main>
<script src="/js/enrollments.js"></script>
</body>
</html>
