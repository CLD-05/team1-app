<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청 시스템 — 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-50:  #f0faf4;
            --green-100: #d6f0e0;
            --green-200: #a8dbb8;
            --green-400: #4caf78;
            --green-500: #2e9457;
            --green-600: #1f7240;
            --green-800: #0d4424;
            --gray-50:   #f8f9fa;
            --gray-100:  #f1f3f5;
            --gray-200:  #e9ecef;
            --gray-400:  #adb5bd;
            --gray-600:  #6c757d;
            --gray-800:  #343a40;
            --radius-sm: 8px;
            --radius-md: 12px;
        }
        body {
            font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .left-panel {
            background: linear-gradient(160deg, var(--green-500) 0%, var(--green-800) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -100px; right: -100px;
        }
        .left-panel::after {
            content: '';
            position: absolute;
            width: 250px; height: 250px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            bottom: -60px; left: -60px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .brand-name {
            font-size: 1rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }
        .hero-title {
            font-size: 2.6rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 1.2rem;
            letter-spacing: -0.5px;
        }
        .hero-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            line-height: 1.7;
            max-width: 320px;
        }
        .features {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        .feature-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green-200);
            flex-shrink: 0;
        }
        .right-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background: #fff;
        }
        .login-box { width: 100%; max-width: 380px; }
        .login-header { margin-bottom: 2.5rem; }
        .login-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 0.4rem;
        }
        .login-header p { font-size: 0.9rem; color: var(--gray-600); }
        .form-group { margin-bottom: 1.2rem; }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 0.5rem;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--gray-800);
            background: var(--gray-50);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        input:focus { border-color: var(--green-400); background: #fff; }
        .error-box {
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-left: 3px solid #ef4444;
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #b91c1c;
            margin-bottom: 1.2rem;
        }
        .submit-btn {
            width: 100%;
            padding: 0.88rem;
            background: var(--green-500);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.4rem;
        }
        .submit-btn:hover { background: var(--green-600); }
        .submit-btn:active { transform: scale(0.99); }
        .divider {
            text-align: center;
            font-size: 0.8rem;
            color: var(--gray-400);
            margin: 1.5rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%; width: 42%; height: 1px;
            background: var(--gray-200);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .info-note {
            background: var(--green-50);
            border: 1px solid var(--green-100);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            color: var(--green-600);
            text-align: center;
        }
        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .left-panel { display: none; }
            .right-panel { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
<div class="left-panel">
    <div class="brand">
        <div class="brand-icon">🎓</div>
        <span class="brand-name">수강신청 시스템</span>
    </div>
    <h1 class="hero-title">멋사 대학교<br>수강신청</h1>
    <p class="hero-sub">대규모 트래픽에도 안정적인 EKS 기반 인프라로<br>수강신청을 지원합니다.</p>
    <div class="features">
        <div class="feature-item"><span class="feature-dot"></span>실시간 정원 확인</div>
        <div class="feature-item"><span class="feature-dot"></span>동시 신청 충돌 방지</div>
        <div class="feature-item"><span class="feature-dot"></span>수강 내역 즉시 조회</div>
    </div>
</div>
<div class="right-panel">
    <div class="login-box">
        <div class="login-header">
            <h2>로그인</h2>
            <p>이메일과 비밀번호를 입력해주세요</p>
        </div>
        <div th:if="${error}" class="error-box">⚠ <span th:text="${error}"></span></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="student1@test.com" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="submit-btn">로그인</button>
        </form>
        <div class="divider">안내</div>
        <div class="info-note">수강신청 기간에만 로그인이 가능합니다</div>
    </div>
</div>
</body>
</html>
