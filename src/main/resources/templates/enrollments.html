<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 수강 내역</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-50:  #f0faf4;
            --green-100: #d6f0e0;
            --green-200: #a8dbb8;
            --green-400: #4caf78;
            --green-500: #2e9457;
            --green-600: #1f7240;
            --green-800: #0d4424;
            --gray-50:   #f8f9fa;
            --gray-100:  #f1f3f5;
            --gray-200:  #e9ecef;
            --gray-400:  #adb5bd;
            --gray-500:  #868e96;
            --gray-600:  #6c757d;
            --gray-700:  #495057;
            --gray-800:  #343a40;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        body {
            font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
            background: var(--green-50);
            min-height: 100vh;
            color: var(--gray-800);
        }
        header {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-dot {
            width: 28px; height: 28px;
            background: var(--green-500);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .logo-text { font-size: 0.95rem; font-weight: 600; color: var(--gray-800); }
        .header-right { display: flex; align-items: center; gap: 1.2rem; }
        .student-badge { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; color: var(--gray-600); }
        .avatar {
            width: 30px; height: 30px;
            background: var(--green-100);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 600;
            color: var(--green-600);
        }
        .nav-link {
            font-size: 0.875rem;
            color: var(--gray-600);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            transition: background 0.15s, color 0.15s;
        }
        .nav-link:hover { background: var(--gray-100); color: var(--gray-800); }
        .nav-link.active { background: var(--green-50); color: var(--green-600); font-weight: 500; }
        .logout-btn {
            font-size: 0.875rem;
            color: var(--gray-500);
            background: none;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            padding: 0.35rem 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .logout-btn:hover { background: var(--gray-100); }
        main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.4rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-success { background: var(--green-50); border: 1px solid var(--green-200); color: var(--green-600); }
        .alert-error   { background: #fff5f5; border: 1px solid #fecaca; color: #b91c1c; }
        /* 요약 카드 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
        }
        .summary-card.accent {
            background: var(--green-500);
            border-color: var(--green-500);
        }
        .summary-label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--gray-500);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .summary-card.accent .summary-label { color: rgba(255,255,255,0.7); }
        .summary-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gray-800);
            line-height: 1;
        }
        .summary-card.accent .summary-value { color: #fff; }
        .summary-unit {
            font-size: 0.9rem;
            font-weight: 400;
            margin-left: 2px;
        }
        /* 테이블 */
        .table-wrap {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: var(--gray-50);
            padding: 0.75rem 1.25rem;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gray-600);
            border-bottom: 1px solid var(--gray-200);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        tbody td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--green-50); }
        .course-code {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .credit-badge {
            display: inline-block;
            background: var(--green-50);
            color: var(--green-600);
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            border: 1px solid var(--green-100);
        }
        .date-text { font-size: 0.82rem; color: var(--gray-500); }
        .cancel-btn {
            padding: 0.35rem 0.8rem;
            background: #fff;
            color: #ef4444;
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cancel-btn:hover { background: #fff5f5; }
        .empty-state {
            padding: 4rem;
            text-align: center;
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
        .empty-title { font-size: 1rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.4rem; }
        .empty-sub { font-size: 0.875rem; color: var(--gray-400); }
        .go-btn {
            display: inline-block;
            margin-top: 1.2rem;
            padding: 0.6rem 1.2rem;
            background: var(--green-500);
            color: #fff;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.15s;
        }
        .go-btn:hover { background: var(--green-600); }
        form.inline-form { display: inline; }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <div class="logo-dot">🎓</div>
        <span class="logo-text">수강신청</span>
    </div>
    <div class="header-right">
        <a th:href="@{/courses}" class="nav-link">강의 검색</a>
        <a th:href="@{/enrollments}" class="nav-link active">내 수강 내역</a>
        <div class="student-badge">
            <div class="avatar" th:text="${#strings.substring(studentName, 0, 1)}">김</div>
            <span th:text="${studentName} + ' 님'">학생 님</span>
        </div>
        <form class="inline-form" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">로그아웃</button>
        </form>
    </div>
</header>

<main>
    <div class="page-header">
        <h1>내 수강 내역</h1>
        <p>신청한 강의 목록을 확인하고 관리하세요</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">✓ <span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}"   class="alert alert-error">⚠ <span th:text="${errorMessage}"></span></div>

    <div class="summary-grid">
        <div class="summary-card accent">
            <div class="summary-label">총 신청 학점</div>
            <div class="summary-value">
                <span th:text="${totalCredits}">0</span><span class="summary-unit">학점</span>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-label">신청 과목 수</div>
            <div class="summary-value">
                <span th:text="${#lists.size(enrollments)}">0</span><span class="summary-unit">개</span>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-label">최대 신청 학점</div>
            <div class="summary-value">
                <span>21</span><span class="summary-unit">학점</span>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>강의코드</th>
                <th>강의명</th>
                <th>학점</th>
                <th>신청일시</th>
                <th>취소</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${enrollments}">
                <td><span class="course-code" th:text="${e.course.courseCode}"></span></td>
                <td th:text="${e.course.courseName}"></td>
                <td><span class="credit-badge" th:text="${e.course.credits} + '학점'"></span></td>
                <td><span class="date-text" th:text="${#temporals.format(e.createdAt, 'yyyy.MM.dd HH:mm')}"></span></td>
                <td>
                    <form class="inline-form"
                          th:action="@{/enrollments/{id}/cancel(id=${e.enrollmentId})}"
                          method="post"
                          onsubmit="return confirm('수강을 취소하시겠습니까?')">
                        <button type="submit" class="cancel-btn">취소</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(enrollments)}">
                <td colspan="5">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-title">신청한 강의가 없습니다</div>
                        <div class="empty-sub">강의 검색에서 수강신청을 시작해보세요</div>
                        <a th:href="@{/courses}" class="go-btn">강의 검색하기</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
