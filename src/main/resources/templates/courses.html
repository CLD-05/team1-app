<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-50:  #f0faf4;
            --green-100: #d6f0e0;
            --green-200: #a8dbb8;
            --green-400: #4caf78;
            --green-500: #2e9457;
            --green-600: #1f7240;
            --green-800: #0d4424;
            --gray-50:   #f8f9fa;
            --gray-100:  #f1f3f5;
            --gray-200:  #e9ecef;
            --gray-300:  #dee2e6;
            --gray-400:  #adb5bd;
            --gray-600:  #6c757d;
            --gray-700:  #495057;
            --gray-800:  #343a40;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        body {
            font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
            background: var(--green-50);
            min-height: 100vh;
            color: var(--gray-800);
        }
        /* 헤더 */
        header {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-dot {
            width: 28px; height: 28px;
            background: var(--green-500);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .logo-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gray-800);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .student-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        .avatar {
            width: 30px; height: 30px;
            background: var(--green-100);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--green-600);
        }
        .nav-link {
            font-size: 0.875rem;
            color: var(--gray-600);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            transition: background 0.15s, color 0.15s;
        }
        .nav-link:hover { background: var(--gray-100); color: var(--gray-800); }
        .nav-link.active {
            background: var(--green-50);
            color: var(--green-600);
            font-weight: 500;
        }
        .logout-btn {
            font-size: 0.875rem;
            color: var(--gray-500);
            background: none;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            padding: 0.35rem 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .logout-btn:hover { background: var(--gray-100); }
        /* 메인 */
        main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.4rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); }
        /* 알림 */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-success { background: var(--green-50); border: 1px solid var(--green-200); color: var(--green-600); }
        .alert-error   { background: #fff5f5; border: 1px solid #fecaca; color: #b91c1c; }
        /* 검색 바 */
        .search-section {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .search-input-wrap {
            flex: 1;
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 1rem;
        }
        .search-input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--gray-800);
            background: var(--gray-50);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--green-400); background: #fff; }
        .search-btn {
            padding: 0.7rem 1.4rem;
            background: var(--green-500);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-btn:hover { background: var(--green-600); }
        /* 테이블 */
        .table-wrap {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        .table-meta {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.82rem;
            color: var(--gray-600);
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: var(--gray-50);
            padding: 0.75rem 1.25rem;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gray-600);
            border-bottom: 1px solid var(--gray-200);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        tbody td {
            padding: 0.9rem 1.25rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--green-50); }
        .course-code {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.74rem;
            font-weight: 500;
        }
        .badge-major-req  { background: #dbeafe; color: #1d4ed8; }
        .badge-major-elec { background: #ede9fe; color: #6d28d9; }
        .badge-gen-req    { background: #fef9c3; color: #854d0e; }
        .badge-gen-elec   { background: var(--green-100); color: var(--green-800); }
        .capacity-bar-wrap { display: flex; align-items: center; gap: 8px; }
        .capacity-bar {
            width: 70px; height: 5px;
            background: var(--gray-200);
            border-radius: 999px;
            overflow: hidden;
        }
        .capacity-fill {
            height: 100%;
            border-radius: 999px;
            background: var(--green-400);
            transition: width 0.3s;
        }
        .capacity-fill.full { background: #ef4444; }
        .capacity-text { font-size: 0.8rem; color: var(--gray-500); white-space: nowrap; }
        .enroll-btn {
            padding: 0.38rem 0.9rem;
            background: var(--green-500);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .enroll-btn:hover { background: var(--green-600); }
        .full-text { font-size: 0.82rem; color: var(--gray-400); }
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--gray-400);
            font-size: 0.9rem;
        }
        /* 페이지네이션 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1.5rem;
        }
        .page-btn {
            width: 34px; height: 34px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            background: #fff;
            color: var(--gray-600);
            font-size: 0.85rem;
            text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .full-text {
            font-size: 0.82rem;
            color: var(--gray-400);
        }
        .page-btn:hover { background: var(--green-50); border-color: var(--green-200); color: var(--green-600); }
        .page-btn.active { background: var(--green-500); border-color: var(--green-500); color: #fff; }
        form.inline-form { display: inline; }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <div class="logo-dot">🎓</div>
        <span class="logo-text">수강신청</span>
    </div>
    <div class="header-right">
        <a th:href="@{/courses}" class="nav-link active">강의 검색</a>
        <a th:href="@{/enrollments}" class="nav-link">내 수강 내역</a>
        <div class="student-badge">
            <div class="avatar" th:text="${#strings.substring(studentName, 0, 1)}">김</div>
            <span th:text="${studentName} + ' 님'">학생 님</span>
        </div>
        <form class="inline-form" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">로그아웃</button>
        </form>
    </div>
</header>

<main>
    <div class="page-header">
        <h1>강의 검색</h1>
        <p>강의명으로 검색하고 수강신청하세요</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">✓ <span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}"   class="alert alert-error">⚠ <span th:text="${errorMessage}"></span></div>

    <div class="search-section">
        <form th:action="@{/courses}" method="get" style="display:flex;gap:0.75rem;width:100%;align-items:center;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" name="name" th:value="${keyword}"
                       placeholder="강의명 검색 (최소 2자)">
                <input type="hidden" name="size" value="20">
            </div>
            <button type="submit" class="search-btn">검색</button>
        </form>
    </div>

    <div class="table-wrap">
        <div class="table-meta"
             th:text="'총 ' + ${totalElements} + '개 강의'">총 0개 강의</div>
        <table>
            <thead>
            <tr>
                <th>강의코드</th>
                <th>강의명</th>
                <th>구분</th>
                <th>학점</th>
                <th>정원 현황</th>
                <th>신청</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td><span class="course-code" th:text="${course.courseCode}"></span></td>
                <td th:text="${course.courseName}"></td>
                <td>
                    <span th:switch="${course.courseType}">
                        <span th:case="'MAJOR_REQUIRED'"   class="badge badge-major-req">전공필수</span>
                        <span th:case="'MAJOR_ELECTIVE'"   class="badge badge-major-elec">전공선택</span>
                        <span th:case="'GENERAL_REQUIRED'" class="badge badge-gen-req">교양필수</span>
                        <span th:case="'GENERAL_ELECTIVE'" class="badge badge-gen-elec">교양선택</span>
                    </span>
                </td>
                <td th:text="${course.credits} + '학점'"></td>
                <td>
                    <div class="capacity-bar-wrap">
                        <div class="capacity-bar">
                            <div class="capacity-fill"
                                 th:classappend="${course.currentEnrollment >= course.capacity} ? 'full' : ''"
                                 th:style="'width:' + ${course.capacity > 0 ? (course.currentEnrollment * 100 / course.capacity) : 0} + '%'"></div>
                        </div>
                        <span class="capacity-text"
                              th:text="${course.currentEnrollment} + '/' + ${course.capacity}"></span>
                    </div>
                </td>
                <td>
                    <span th:if="${course.currentEnrollment >= course.capacity}" class="full-text">마감</span>

                    <span th:if="${!enrollmentOpen and course.currentEnrollment < course.capacity}"
                          class="full-text"
                          title="수강신청 가능 시간: 10:00~10:30 / 14:00~14:30 / 16:00~16:30"> 신청불가 </span>

                    <form th:if="${enrollmentOpen and course.currentEnrollment < course.capacity}"
                          class="inline-form" th:action="@{/enrollments}" method="post">
                        <input type="hidden" name="courseId" th:value="${course.courseId}">
                        <button type="submit" class="enroll-btn">신청</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="6">
                    <div class="empty-state">검색 결과가 없습니다</div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <a class="page-btn"
           th:href="@{/courses(name=${keyword}, page=${currentPage - 1}, size=20)}"
           th:if="${currentPage > 0}">‹</a>
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           class="page-btn"
           th:href="@{/courses(name=${keyword}, page=${i}, size=20)}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? ' active' : ''"></a>
        <a class="page-btn"
           th:href="@{/courses(name=${keyword}, page=${currentPage + 1}, size=20)}"
           th:if="${currentPage < totalPages - 1}">›</a>
    </div>
</main>
</body>
</html>
