spring:
  application:
    name: team1-app
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration       # ← 스키마만. 시드는 포함하지 않음
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized