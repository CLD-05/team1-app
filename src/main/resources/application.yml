spring:
  datasource:
    hikari:
      maximum-pool-size: 100 # DB 연결 통로 개수 (기본 10에서 100으로 상향)
      minimum-idle: 10      # 유휴 상태일 때 유지할 최소 연결 수
    url: jdbc:mysql://host.docker.internal:3306/course_registration
    username: app
    password: app
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: team1-app
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration       # ← 스키마만. 시드는 포함하지 않음
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

server:
  port: 8080
  tomcat:
    threads:
      max: 200            # 동시에 처리할 수 있는 최대 스레드 수 (기본값 200)
      min-spare: 20       # 최소한 유지할 스레드 수
    max-connections: 5000 # 동시에 연결 가능한 최대 커넥션 수
    accept-count: 1000     # 모든 스레드가 바쁠 때 대기할 수 있는 큐(대기열) 크기

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-at-least-256-bits-long-please-change-in-production-environment}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:14400}